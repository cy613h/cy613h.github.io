{% extends 'base.html' %}

{% block title %}cy613h | Contact{% endblock %}

{% block content %}
<div class="page-title">
    <h1>Contact</h1>
    <p>Get in touch</p>
</div>
    
    {% if success %}
    <div class="success-message">
        <h3>Message Sent!</h3>
        <p>Thank you for reaching out. I'll get back to you as soon as possible.</p>
        <p style="margin-top:1rem"><a href="{% url 'blog:contact' %}" class="btn btn-secondary">Send another message</a></p>
    </div>
    {% else %}
    
    <form method="POST" action="{% url 'blog:contact' %}" class="contact-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_name">Name</label>
            <input type="text" id="id_name" name="name" required placeholder="Your name or pseudonym">
        </div>
        
        <div class="form-group">
            <label for="id_email">Email</label>
            <input type="email" id="id_email" name="email" required placeholder="your@email.com">
        </div>
        
        <div class="form-group">
            <label for="id_subject">Subject</label>
            <input type="text" id="id_subject" name="subject" required placeholder="What's this about?">
        </div>
        
        <div class="form-group">
            <label for="id_message">Message</label>
            <textarea id="id_message" name="message" required placeholder="Your message here..."></textarea>
        </div>
        
        <button type="submit" class="btn-submit">Send Message</button>
    </form>
    {% endif %}
</section>
{% endblock %}
