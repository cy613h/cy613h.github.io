{% extends "admin/change_form.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const contentField = document.querySelector('#id_content');
    if (!contentField) return;

    const toolbar = contentField.closest('.markdownx')?.querySelector('.markdownx-editor-toolbar');
    if (!toolbar) {
        const toolbarArea = contentField.parentElement;
        const newToolbar = document.createElement('div');
        newToolbar.className = 'markdown-inline-toolbar';
        newToolbar.innerHTML = '<button type="button" class="insert-image-btn">Insert Image</button>';
        toolbarArea.insertBefore(newToolbar, contentField);
        setupInsertButton(newToolbar.querySelector('.insert-image-btn'), contentField);
        return;
    }

    const existingBtn = toolbar.querySelector('.insert-image-btn');
    if (!existingBtn) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'insert-image-btn';
        btn.textContent = '🖼 Insert Image';
        btn.title = 'Insert inline image';
        toolbar.appendChild(btn);
        setupInsertButton(btn, contentField);
    }

    function setupInsertButton(btn, textarea) {
        btn.addEventListener('click', function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.style.display = 'none';
            document.body.appendChild(input);

            input.addEventListener('change', function() {
                if (input.files.length > 0) {
                    uploadAndInsert(input.files[0], textarea);
                }
                document.body.removeChild(input);
            });
            input.click();
        });
    }

    function uploadAndInsert(file, textarea) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));

        const btn = document.activeElement;
        if (btn && btn.classList.contains('insert-image-btn')) {
            btn.textContent = '⏳ Uploading...';
            btn.disabled = true;
        }

        fetch('{% url "blog:upload_inline_image" %}', {
            method: 'POST',
            body: formData,
        })
        .then(response => response.json())
        .then(data => {
            if (data.url) {
                const mdImage = `\n![${file.name}](${data.url})\n`;
                insertTextAtCursor(textarea, mdImage);
            } else {
                alert('Upload failed: ' + (data.message || 'Unknown error'));
            }
        })
        .catch(error => {
            alert('Upload failed: ' + error.message);
        })
        .finally(() => {
            const btn = document.querySelector('.insert-image-btn');
            if (btn) {
                btn.textContent = '🖼 Insert Image';
                btn.disabled = false;
            }
        });
    }

    function insertTextAtCursor(textarea, text) {
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const before = textarea.value.substring(0, start);
        const after = textarea.value.substring(end);
        textarea.value = before + text + after;
        textarea.selectionStart = textarea.selectionEnd = start + text.length;
        textarea.focus();

        const event = new Event('input', { bubbles: true });
        textarea.dispatchEvent(event);
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
});
</script>
<style>
.insert-image-btn {
    padding: 4px 10px;
    margin-right: 4px;
    cursor: pointer;
    background: #444;
    color: #fff;
    border: 1px solid #555;
    border-radius: 3px;
}
.insert-image-btn:hover {
    background: #555;
}
.insert-image-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
.markdown-inline-toolbar {
    padding: 5px;
    background: #f5f5f5;
    border-bottom: 1px solid #ddd;
}
</style>
{% endblock %}
